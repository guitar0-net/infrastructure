name: Deploy Monitoring

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy monitoring → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ansible/requirements.txt

      - name: Install dependencies
        run: pip install -r ansible/requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('ansible/requirements.yml') }}
          restore-keys: |
            ansible-collections-

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH key
        run: |
          install -d -m 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Configure SSH known hosts
        run: echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Create Ansible vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          SSH_PRIVATE_KEY_FILE: /tmp/deploy_key
        run: |
          ansible-playbook playbooks/monitoring.yml \
            -i inventory/${{ inputs.environment }}.yml

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/deploy_key
          rm -f ansible/.vault_pass
