groups:
  - name: guitar0_alerts
    rules:
      - alert: Guitar0BackendDownProduction
        expr: absent(up{job="guitar0-backend", env="production"}) or up{job="guitar0-backend", env="production"} == 0
        for: 2m
        labels:
          severity: critical
          env: production
        annotations:
          summary: "Guitar0 backend недоступен"
          description: "Backend не отвечает более 2 минут."

      - alert: Guitar0BackendDownStaging
        expr: absent(up{job="guitar0-backend", env="staging"}) or up{job="guitar0-backend", env="staging"} == 0
        for: 2m
        labels:
          severity: critical
          env: staging
        annotations:
          summary: "Guitar0 backend недоступен"
          description: "Backend не отвечает более 2 минут."

      - alert: Guitar0High5xxErrorRate
        expr: guitar0:http_error_rate_5xx:ratio5m > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Высокий уровень 5xx ошибок"
          description: "5xx error rate: {{ $value | humanizePercentage }} (порог 5%)"

      - alert: Guitar0High4xxErrorRateProduction
        expr: guitar0:http_error_rate_4xx:ratio5m{env="production"} > 0.20
        for: 10m
        labels:
          severity: warning
          env: production
        annotations:
          summary: "Высокий уровень 4xx ошибок"
          description: "4xx error rate: {{ $value | humanizePercentage }} (порог 20%)"

      - alert: Guitar0High4xxErrorRateStaging
        expr: guitar0:http_error_rate_4xx:ratio5m{env="staging"} > 0.90
        for: 10m
        labels:
          severity: warning
          env: staging
        annotations:
          summary: "Высокий уровень 4xx ошибок"
          description: "4xx error rate: {{ $value | humanizePercentage }} (порог 90%)"

      - alert: Guitar0HighLatency
        expr: guitar0:http_request_duration_p99:5m > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая латентность P99"
          description: "P99 latency: {{ humanizeDuration $value }} (порог 1s)"

  - name: node_alerts
    rules:
      - alert: NodeHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Высокая загрузка CPU"
          description: 'CPU: {{ printf "%.1f" $value }}% (порог 80%)'

      - alert: NodeHighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокое потребление памяти"
          description: 'Memory: {{ printf "%.1f" $value }}% (порог 85%)'

      - alert: NodeDiskSpaceLow
        expr: >-
          (1 - node_filesystem_avail_bytes{mountpoint="/"}
             / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Заканчивается место на диске"
          description: 'Disk /: {{ printf "%.1f" $value }}% (порог 85%)'
