version = 1

[[annotations]]
path = [
    # Ansible Vault — encrypted, cannot contain plaintext headers
    "ansible/inventory/group_vars/staging/vault.yml",
    "ansible/inventory/group_vars/production/vault.yml",
    "ansible/.vault_pass",
    # Ansible generated cache
    "ansible/.ansible/**",
]
precedence = "closest"
