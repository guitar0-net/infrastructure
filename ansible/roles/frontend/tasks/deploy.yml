---
- name: Log deployment start
  ansible.builtin.lineinfile:
    path: "{{ frontend_log_dir }}/deployments.log"
    line: "{{ ansible_facts['date_time']['iso8601'] }} - Starting deployment of {{ frontend_docker_image }}:{{ frontend_docker_tag }}"
    create: true
    mode: "0644"

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    password: "{{ lookup('env', 'DOCKERHUB_TOKEN') }}"
  when: lookup('env', 'DOCKERHUB_USERNAME') != ''

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ frontend_docker_image }}:{{ frontend_docker_tag }}"
    source: pull
    force_source: true
  retries: 3
  delay: 10
  register: frontend_pull_result
  until: frontend_pull_result is succeeded

- name: Check for current version file
  ansible.builtin.stat:
    path: "{{ frontend_shared_dir }}/CURRENT_VERSION"
  register: frontend_current_version_stat

- name: Save previous version for rollback
  when: frontend_current_version_stat.stat.exists
  block:
    - name: Read current version
      ansible.builtin.slurp:
        src: "{{ frontend_shared_dir }}/CURRENT_VERSION"
      register: frontend_current_version_file

    - name: Write previous version
      ansible.builtin.copy:
        content: "{{ frontend_current_version_file.content | b64decode }}"
        dest: "{{ frontend_shared_dir }}/PREVIOUS_VERSION"
        mode: "0644"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.prod.j2
    dest: "{{ frontend_shared_dir }}/docker-compose.yml"
    mode: "0644"

- name: Render .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ frontend_shared_dir }}/.env"
    mode: "0600"

- name: Deploy and verify
  block:
    - name: Deploy frontend with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ frontend_shared_dir }}"
        state: present
        pull: never
        recreate: always

    - name: Wait for frontend to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ frontend_app_port }}{{ frontend_health_check_path }}"
        status_code: 200
      register: frontend_health_check
      until: frontend_health_check.status == 200
      retries: "{{ frontend_health_check_retries }}"
      delay: "{{ frontend_health_check_delay }}"

    - name: Save current version
      ansible.builtin.copy:
        content: "{{ frontend_docker_tag }}"
        dest: "{{ frontend_shared_dir }}/CURRENT_VERSION"
        mode: "0644"

    - name: Log deployment success
      ansible.builtin.lineinfile:
        path: "{{ frontend_log_dir }}/deployments.log"
        line: "{{ ansible_facts['date_time']['iso8601'] }} - Successfully deployed {{ frontend_docker_image }}:{{ frontend_docker_tag }}"
        create: true
        mode: "0644"

  rescue:
    - name: Log deployment failure
      ansible.builtin.lineinfile:
        path: "{{ frontend_log_dir }}/deployments.log"
        line: "{{ ansible_facts['date_time']['iso8601'] }} - FAILED deployment of {{ frontend_docker_image }}:{{ frontend_docker_tag }}"
        create: true
        mode: "0644"

    - name: Read previous version for rollback
      ansible.builtin.slurp:
        src: "{{ frontend_shared_dir }}/PREVIOUS_VERSION"
      register: frontend_rollback_version_file
      ignore_errors: true

    - name: Rollback to previous version
      when: frontend_rollback_version_file is succeeded
      block:
        - name: Set rollback tag
          ansible.builtin.set_fact:
            frontend_rollback_tag: "{{ frontend_rollback_version_file.content | b64decode }}"

        - name: Pull previous image
          community.docker.docker_image:
            name: "{{ frontend_docker_image }}:{{ frontend_rollback_tag }}"
            source: pull
            force_source: true
          retries: 3
          delay: 10
          register: frontend_rollback_pull
          until: frontend_rollback_pull is succeeded

        - name: Re-render docker-compose with previous tag
          ansible.builtin.template:
            src: docker-compose.prod.j2
            dest: "{{ frontend_shared_dir }}/docker-compose.yml"
            mode: "0644"
          vars:
            frontend_docker_tag: "{{ frontend_rollback_tag }}"

        - name: Start previous version
          community.docker.docker_compose_v2:
            project_src: "{{ frontend_shared_dir }}"
            state: present
            recreate: always

        - name: Restore version file
          ansible.builtin.copy:
            content: "{{ frontend_rollback_tag }}"
            dest: "{{ frontend_shared_dir }}/CURRENT_VERSION"
            mode: "0644"

        - name: Log rollback
          ansible.builtin.lineinfile:
            path: "{{ frontend_log_dir }}/deployments.log"
            line: "{{ ansible_facts['date_time']['iso8601'] }} - ROLLBACK: Reverted to {{ frontend_docker_image }}:{{ frontend_rollback_tag }}"
            create: true
            mode: "0644"

    - name: Fail the play after rollback
      ansible.builtin.fail:
        msg: >
          Deployment failed.
          {{ 'Rolled back to ' ~ frontend_docker_image ~ ':' ~ frontend_rollback_tag
             if frontend_rollback_version_file is succeeded
             else 'No previous version to roll back to.' }}
