---
- name: Create frontend application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop:
    - "{{ frontend_app_dir }}"
    - "{{ frontend_shared_dir }}"
    - "{{ frontend_log_dir }}"
