---
- name: Set kernel parameters for Docker
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    line: "{{ item }}"
    create: true
    mode: "0644"
  loop:
    - "vm.max_map_count=262144"
    - "net.core.somaxconn=65535"
    - "net.ipv4.tcp_max_syn_backlog=65535"
  notify: Apply sysctl
