---
# Staging environment — non-secret variables
# Secrets (passwords, tokens, keys) live in vault.yml

app_env: staging

# --- Backend ---
backend_app_port: 8000
backend_db_docker_port: 5433

backend_nginx_domains:
  - server_name: api.staging.guitar0.net
    x_frame_options: DENY
    serve_static: true
    serve_media: true
    locations:
      - path: /admin/
        rate_limit: general_limit
        allow_only:
          - 127.0.0.1
      - path: /
        rate_limit: api_limit

# --- Frontend ---
frontend_app_port: 3000
frontend_api_url: api.staging.guitar0.net

frontend_nginx_domains:
  - server_name: staging.guitar0.net
    locations:
      - path: /
        rate_limit: general_limit

# --- Monitoring ---
monitoring_dir: /opt/guitar0-monitoring
grafana_domain: grafana.staging.guitar0.net
monitoring_grafana_port: 3010
